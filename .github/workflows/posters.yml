name: Poster freshness

# Gate ADR-0001: posters phải khớp Fullscreen preview. Regen trong CI và fail
# nếu `git diff` thấy lệch → poster không thể stale so với source preview.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  posters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm playwright install --with-deps chromium

      - name: Build docs app
        run: pnpm build

      - name: Regenerate posters and fail on drift
        run: pnpm posters:check
