name: CI

# Gate chất lượng tối thiểu (overhaul Phase 3 #10): lint + build (build đã gồm
# type-coverage guard + check-types + SSG render mọi /preview/[slug] = smoke
# build-time) + smoke runtime kiểm route trả 200/redirect (không 404/500).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build (type-coverage guard + check-types + SSG)
        run: pnpm build

      - name: Smoke test routes (runtime)
        run: |
          pnpm --filter docs run start &
          SERVER_PID=$!
          # đợi server lên (tối đa ~60s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ >/dev/null && break
            sleep 2
          done
          fail=0
          for path in / /templates "/preview/ternus" /sections /ui; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000$path")
            echo "$path -> $code"
            case "$code" in
              200|30[0-9]) ;;
              *) echo "FAIL $path ($code)"; fail=1 ;;
            esac
          done
          kill "$SERVER_PID" 2>/dev/null || true
          exit $fail
